<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Koreatube</title>

  <style>
    body {
      font-family: Arial;
      background: #eaf6ff;
      margin: 0;
    }

    header {
      background: #b3e5fc;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    .video-box {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }

    video {
      width: 300px;
      display: block;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>📺 Koreatube</header>

<div class="container">

  <h3>로그인 / 회원가입</h3>
  <input type="email" id="email" placeholder="이메일">
  <input type="password" id="password" placeholder="비밀번호">
  <button id="signup">회원가입</button>
  <button id="login">로그인</button>

  <hr>

  <h3>영상 업로드</h3>
  <input type="text" id="title" placeholder="영상 제목">
  <input type="file" id="file">
  <button id="upload">업로드</button>

  <hr>

  <h3>영상 목록</h3>
  <div id="videos"></div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
