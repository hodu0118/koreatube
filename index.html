<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Koreatube</title>

  <style>
    body {
      font-family: sans-serif;
      background: #eaf6ff;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #4da6ff;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      background: #a3d8ff;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #7cc7ff;
    }

    .video-box {
      background: white;
      margin: 15px;
      padding: 10px;
      border-radius: 15px;
    }

    video {
      width: 300px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>🌤 Koreatube</h1>

  <h3>로그인 / 회원가입</h3>
  <input id="email" placeholder="이메일"><br>
  <input id="password" type="password" placeholder="비밀번호"><br>
  <button id="signup">회원가입</button>
  <button id="login">로그인</button>

  <hr>

  <h3>영상 업로드</h3>
  <input id="title" placeholder="영상 제목"><br>
  <input type="file" id="file"><br>
  <button id="upload">업로드</button>

  <hr>

  <h3>영상 목록</h3>
  <div id="videos"></div>

  <script type="module" src="script.js"></script>

</body>
</html>
